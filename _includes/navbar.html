<nav style="background:#d3c3b5; border-bottom:1px solid #bfad9e; position:fixed; top:0; left:0; right:0; z-index:1000;">
  <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}" style="display:flex; align-items:center; justify-content:space-between; height:52px;">
 
    <a class="navbar-brand" style="font-size:15px; font-weight:500; color:#3a2e26; letter-spacing:-0.01em; text-decoration:none;">
      <strong>{{ site.data.profile.navbar_name }}</strong>
    </a>
 
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
      aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation"
      style="background:transparent; border:1px solid #bfad9e; border-radius:6px; padding:5px 10px; font-size:12px; color:#6b5a4e; cursor:pointer;">
      Menu
    </button>
 
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ml-auto" style="display:flex; gap:2px; list-style:none; margin:0; padding:0; align-items:center;">
        {% for item in site.data.navigation.pages %}
        <li class="nav-item" style="position:relative;">
          <a class="nav-link" href="{{ item.url | relative_url }}"
            style="font-size:13px; padding:5px 12px; border-radius:5px; text-decoration:none; display:block;
                   color:{% if item.name == page.navbar_title %}#3a2e26{% else %}#6b5a4e{% endif %};
                   font-weight:{% if item.name == page.navbar_title %}500{% else %}400{% endif %};
                   background:{% if item.name == page.navbar_title %}rgba(255,255,255,0.25){% else %}transparent{% endif %};">
            {{ item.name }}
            {% if item.name == page.navbar_title %}
            <span style="display:block; height:2px; background:#95bade; border-radius:1px; margin-top:2px;"></span>
            {% endif %}
          </a>
        </li>
        {% endfor %}
      </ul>
    </div>
 
  </div>
</nav>
