<footer style="background:#c9b8a8; border-top:1px solid #bfad9e; padding:12px 0; margin-top:3rem;">
  <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <span style="font-size:12px; color:#6b5a4e; font-style:italic;">
        Last updated: {{ "now" | date: "%b %Y" }}
      </span>
      <span style="font-size:12px; color:#6b5a4e;">
        {{ site.data.display.footer_text }}
      </span>
    </div>
  </div>
</footer>
