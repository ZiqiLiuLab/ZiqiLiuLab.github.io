<footer style="background:#ceebfb; border-top:1px solid #b0d8f0; padding:12px 0; margin-top:3rem;">
  <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <span style="font-size:12px; color:#2e6a94; font-style:italic;">
        Last updated: {{ "now" | date: "%b %Y" }}
      </span>
      <span style="font-size:12px; color:#2e6a94;">
        {{ site.data.display.footer_text }}
      </span>
    </div>
  </div>
</footer>
