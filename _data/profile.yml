short_bio: >-
  <p>
      I am a second-year Ph.D. student at the University of Texas at Dallas, supervised by Prof. Yi Ding.
      I received my B.Eng. degree from Taiyuan University of Technology and my M.Res. degree from the
      University of Liverpool & Xi'an Jiaotong-Liverpool University.
  </p>
  <p>
      My research focuses on the synergy between machine learning and edge computing, spanning 
      innovations in systems and algorithms across ubiquitous devices and wearables — with a 
      particular interest in new opportunities brought by LLMs.
  </p>

